<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs Board — Archery.Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A227;--gold-light:#F0D060;--gold-dark:#8B6F1A;--ink:#0A0A0F;--ink-2:#13131C;--muted:#4A4A60;--muted-2:#6A6A80;--text:#E8E8F0;--text-2:#A8A8C0;--green:#22C55E;--blue:#3B82F6;--r-lg:16px;--r-xl:24px;--g:clamp(16px,4vw,56px);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--ink);color:var(--text);cursor:none;}
#cursor-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cursor-ring{width:34px;height:34px;border:1.5px solid var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.6;transition:width .2s,height .2s;}
#scroll-bar{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-light));width:0%;z-index:9997;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 var(--g);transition:background .4s,backdrop-filter .4s;}
nav.scrolled{background:rgba(10,10,15,.9);backdrop-filter:blur(24px);border-bottom:.5px solid rgba(201,162,39,.18);}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px;max-width:1440px;margin:0 auto;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo svg{width:38px;height:38px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.08em;color:var(--text);}
.logo-text span{color:var(--gold);}
.nav-links{display:flex;align-items:center;gap:2px;list-style:none;}
.nav-links a{text-decoration:none;color:var(--text-2);font-size:13px;padding:6px 12px;border-radius:7px;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-ghost{background:transparent;border:1px solid rgba(201,162,39,.3);color:var(--gold);padding:7px 18px;border-radius:8px;font-size:13px;cursor:none;}
.btn-gold{background:var(--gold);border:none;color:var(--ink);padding:7px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:none;}
.main{max-width:1000px;margin:0 auto;padding:100px var(--g) 80px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--gold);}
h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(32px,5vw,52px);font-weight:600;letter-spacing:-.02em;color:var(--text);margin-bottom:12px;}
h1 em{font-style:normal;color:var(--gold);}
.desc{font-size:15px;color:var(--text-2);line-height:1.8;margin-bottom:40px;max-width:560px;}
.job-card{background:var(--ink-2);border:.5px solid rgba(255,255,255,.07);border-radius:var(--r-xl);padding:24px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;transition:border-color .3s,transform .2s;cursor:none;}
.job-card:hover{border-color:rgba(201,162,39,.25);transform:translateY(-2px);}
.job-left{}
.job-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px;}
.job-org{font-size:13px;color:var(--gold);margin-bottom:8px;}
.job-tags{display:flex;gap:8px;flex-wrap:wrap;}
.job-tag{font-size:11px;padding:4px 10px;background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.07);border-radius:6px;color:var(--text-2);}
.job-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.job-salary{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;color:var(--text);}
.btn-apply{padding:9px 20px;background:var(--gold);border:none;color:var(--ink);border-radius:9px;font-size:13px;font-weight:600;cursor:none;transition:all .2s;}
.btn-apply:hover{background:var(--gold-light);}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s cubic-bezier(.23,1,.32,1),transform .6s cubic-bezier(.23,1,.32,1);}
.reveal.visible{opacity:1;transform:none;}
</style>
</head>
<body>
<div id="cursor-dot"></div><div id="cursor-ring"></div><div id="scroll-bar"></div>
<nav id="main-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg viewBox="0 0 38 38" fill="none"><circle cx="19" cy="19" r="18" stroke="#C9A227" stroke-width=".8"/><circle cx="19" cy="19" r="12" stroke="#C9A227" stroke-width=".5" stroke-dasharray="2 2.5"/><circle cx="19" cy="19" r="6" stroke="#C9A227" stroke-width=".8"/><circle cx="19" cy="19" r="2.2" fill="#C9A227"/><line x1="3" y1="19" x2="17" y2="19" stroke="#C9A227" stroke-width="1.2" stroke-linecap="round"/><polygon points="14,17 17,19 14,21" fill="#C9A227"/></svg>
      <span class="logo-text">Archery<span>.</span>Services</span>
    </a>
    <ul class="nav-links">
      <li><a href="shop.html">Shop</a></li>
      <li><a href="knowledge.html">Knowledge</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="tournaments.html">Tournaments</a></li>
      <li><a href="athletes.html">Athletes</a></li>
      <li><a href="jobs.html" class="active">Jobs</a></li>
    </ul>
    <div class="nav-right"><a class="btn-ghost" href="signin.html" style="text-decoration:none;display:inline-flex;align-items:center;">Sign in</a><a class="btn-gold" href="contact.html" style="text-decoration:none;display:inline-flex;align-items:center;">Post a Job</a></div>
  </div>
</nav>
<div class="main">
  <div class="eyebrow reveal">Jobs Board</div>
  <h1 class="reveal">Careers in <em>Archery.</em></h1>
  <p class="desc reveal">Coaching positions, club management roles, federation staff, and sports science opportunities across Indian archery.</p>
  <div id="jobs-list"></div>
</div>
<script src="shared.js"></script>
<script>
const API='/api';
let JOBS=[];
fetch(API+'/jobs').then(r=>r.json()).then(jobs=>{
  JOBS=jobs;
  document.getElementById('jobs-list').innerHTML=jobs.filter(j=>j.active!==false).map(j=>`
    <div class="job-card reveal">
      <div class="job-left">
        <div class="job-title">${j.title}</div>
        <div class="job-org">${j.org}</div>
        <div class="job-tags">
          <span class="job-tag">${j.location}</span>
          <span class="job-tag">${j.type}</span>
        </div>
      </div>
      <div class="job-right">
        <div class="job-salary">${j.salary}</div>
        <button class="btn-apply" onclick="applyJob(${j.id})">Apply Now</button>
      </div>
    </div>`).join('');
  document.querySelectorAll('.reveal').forEach(r=>{
    new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible');}),{threshold:.1}).observe(r);
  });
}).catch(()=>{
  document.getElementById('jobs-list').innerHTML='<p style="color:var(--text-2);text-align:center;padding:40px;">Could not load jobs right now — please refresh.</p>';
});

// ── JOB APPLICATION (delivered to the admin Live Chat inbox) ──
let applyJobRef=null;
function applyJob(id){
  applyJobRef=JOBS.find(j=>j.id===id)||null;
  let ov=document.getElementById('apply-ov');
  if(!ov){
    ov=document.createElement('div');ov.id='apply-ov';
    ov.style.cssText='position:fixed;inset:0;z-index:9996;background:rgba(7,15,34,.78);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;';
    ov.innerHTML='<div style="background:#102444;border:1px solid rgba(255,255,255,.1);border-radius:16px;width:100%;max-width:440px;padding:24px;">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;"><div id="apply-title" style="font-family:Oswald,Space Grotesk,sans-serif;font-size:16px;color:#F5F8FF;font-weight:600;"></div><button onclick="document.getElementById(\'apply-ov\').style.display=\'none\'" style="background:none;border:none;color:#7E8AA0;font-size:24px;cursor:pointer;line-height:1;">&times;</button></div>'
      +'<div id="apply-org" style="font-size:12px;color:#9AA6BD;margin-bottom:16px;"></div>'
      +'<input id="ap-name" placeholder="Full name *" style="width:100%;background:#0A1730;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:12px 13px;color:#F5F8FF;font-size:14px;outline:none;box-sizing:border-box;margin-bottom:10px;">'
      +'<input id="ap-email" type="email" placeholder="Email *" style="width:100%;background:#0A1730;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:12px 13px;color:#F5F8FF;font-size:14px;outline:none;box-sizing:border-box;margin-bottom:10px;">'
      +'<textarea id="ap-note" placeholder="Experience, certifications, availability…" style="width:100%;min-height:90px;background:#0A1730;border:1px solid rgba(255,255,255,.13);border-radius:9px;padding:12px 13px;color:#F5F8FF;font-size:14px;outline:none;box-sizing:border-box;resize:vertical;margin-bottom:14px;"></textarea>'
      +'<button id="ap-send" onclick="submitApply()" style="width:100%;background:#FFC72C;color:#141414;border:none;border-radius:9px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;">Submit Application</button></div>';
    document.body.appendChild(ov);
    ov.addEventListener('click',e=>{if(e.target===ov)ov.style.display='none';});
  }
  document.getElementById('apply-title').textContent='Apply — '+(applyJobRef?applyJobRef.title:'');
  document.getElementById('apply-org').textContent=applyJobRef?applyJobRef.org+' · '+applyJobRef.location:'';
  try{const u=JSON.parse(localStorage.getItem('archery_user')||'null');if(u){document.getElementById('ap-name').value=u.name||'';document.getElementById('ap-email').value=u.email||'';}}catch(e){}
  ov.style.display='flex';
}
async function submitApply(){
  const name=document.getElementById('ap-name').value.trim();
  const email=document.getElementById('ap-email').value.trim();
  const note=document.getElementById('ap-note').value.trim();
  if(!name||!email){alert('Please enter your name and email.');return;}
  const btn=document.getElementById('ap-send');const o=btn.textContent;btn.textContent='Submitting…';btn.disabled=true;
  const text='JOB APPLICATION — '+(applyJobRef?applyJobRef.title+' @ '+applyJobRef.org:'')+'\n\n'+(note||'(no note)');
  const res=await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,text})}).then(r=>r.json()).catch(()=>null);
  btn.textContent=o;btn.disabled=false;
  if(res&&res.ok){document.getElementById('apply-ov').style.display='none';document.getElementById('ap-note').value='';alert('Application submitted! Our team will reach out by email.');}
  else alert('Could not submit right now — please try again.');
}
</script>
</body>
</html>
