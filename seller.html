<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Dashboard — Archery.Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .sd-wrap{max-width:1000px;margin:0 auto;padding:110px var(--g) 80px;}
  .sd-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:20px;}
  .sd-head h1{font-family:'Oswald',sans-serif;font-size:clamp(28px,4vw,40px);font-weight:600;text-transform:uppercase;letter-spacing:.02em;color:#fff;}
  .sd-head p{color:var(--text-2);font-size:14px;margin-top:6px;}
  .sd-btn{background:var(--gold);color:#131316;border:none;border-radius:8px;padding:12px 22px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
  .sd-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px;}
  .sd-stat{background:var(--char);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:18px;}
  .sd-stat .n{font-family:'Oswald',sans-serif;font-size:28px;font-weight:600;color:#fff;}
  .sd-stat .l{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);margin-top:4px;}
  table{width:100%;border-collapse:collapse;background:var(--char);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;}
  th{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);padding:12px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.08);}
  td{font-size:13px;color:var(--text-2);padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05);}
  .td-name{color:#fff;font-weight:500;}
  .s-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:transparent;color:var(--text-2);cursor:pointer;}
  .s-btn.del{border-color:rgba(210,39,48,.3);color:#E04653;}
  .sd-gate{max-width:460px;margin:140px auto;text-align:center;}
  .sd-gate h1{font-family:'Oswald',sans-serif;text-transform:uppercase;color:#fff;font-size:28px;}
  .sd-gate p{color:var(--text-2);margin:12px 0 22px;line-height:1.6;}
  input,select,textarea{width:100%;background:#101116;border:1px solid rgba(255,255,255,.14);border-radius:9px;padding:11px 13px;color:#fff;font-size:14px;box-sizing:border-box;font-family:inherit;margin-top:6px;}
  label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-2);}
</style>
</head>
<body>
<div class="sd-wrap" id="sd-root">
  <div class="sd-gate"><h1>Seller Dashboard</h1><p>Loading…</p></div>
</div>

<script src="auth.js"></script>
<script>
const T=()=>ArcheryAuth.token();
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const INR=n=>'₹'+Number(n||0).toLocaleString('en-IN');

async function boot(){
  if(!T()){ gate('Sign in required','Sign in to your seller account.','<a class="sd-btn" href="signin.html?next=seller.html" style="text-decoration:none;">Sign in</a>'); return; }
  const d=await fetch('/api/me/dashboard',{headers:{Authorization:'Bearer '+T()}}).then(r=>r.json()).catch(()=>null);
  if(!d||!d.ok){ gate('Sign in required','Your session expired.','<a class="sd-btn" href="signin.html?next=seller.html" style="text-decoration:none;">Sign in</a>'); return; }
  if(d.sellerStatus!=='approved'){
    gate('Not a seller yet', d.sellerStatus==='pending'?'Your seller application is under review — you can list products once approved.':'Apply to become a seller from your account page.','<a class="sd-btn" href="account.html" style="text-decoration:none;">Go to my account</a>');
    return;
  }
  render(d);
}
function gate(h,p,btn){ document.getElementById('sd-root').innerHTML='<div class="sd-gate"><h1>'+h+'</h1><p>'+p+'</p>'+(btn||'')+'</div>'; }

async function render(d){
  const products=await fetch('/api/me/products',{headers:{Authorization:'Bearer '+T()}}).then(r=>r.json()).catch(()=>[]);
  const list=Array.isArray(products)?products:[];
  const live=list.filter(p=>p.active!==false).length;
  const stock=list.reduce((s,p)=>s+(Number(p.stock)||0),0);
  document.getElementById('sd-root').innerHTML=`
    <div class="sd-head"><div><h1>Seller Dashboard</h1><p>${esc(d.businessName||'Your store')} · ${esc(d.user.email)}</p></div><button class="sd-btn" onclick="openProd()">+ Add product</button></div>
    <div class="sd-stats">
      <div class="sd-stat"><div class="n">${list.length}</div><div class="l">Products</div></div>
      <div class="sd-stat"><div class="n">${live}</div><div class="l">Live</div></div>
      <div class="sd-stat"><div class="n">${stock}</div><div class="l">Total stock</div></div>
    </div>
    <table><thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      ${list.length?list.map(p=>`<tr><td class="td-name">${esc(p.name)}</td><td>${esc(p.category||'')}</td><td>${INR(p.price)}</td><td>${p.stock||0}</td><td>${p.active!==false?'<span style="color:#7BE08A;">Live</span>':'<span style="color:var(--muted-2);">Hidden</span>'}</td>
        <td><button class="s-btn" onclick='openProd(${JSON.stringify(p)})'>Edit</button> <button class="s-btn del" onclick="delProd(${p.id})">Delete</button></td></tr>`).join(''):'<tr><td colspan="6" style="padding:22px;color:var(--text-2);">No products yet — add your first listing.</td></tr>'}
    </tbody></table>
    <div style="margin-top:20px;"><a href="account.html" style="color:var(--gold);text-decoration:none;font-size:13px;">← Back to my account</a></div>`;
}

function openProd(p){
  p=p||{};
  const ov=document.createElement('div'); ov.id='prod-ov';
  ov.style.cssText='position:fixed;inset:0;z-index:9998;background:rgba(7,15,34,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:18px;overflow:auto;';
  ov.innerHTML='<div style="background:#17181D;border:1px solid rgba(255,255,255,.1);border-radius:14px;width:100%;max-width:520px;max-height:88vh;overflow:auto;padding:24px;">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div style="font-family:Oswald,sans-serif;font-size:17px;color:#fff;text-transform:uppercase;letter-spacing:.04em;">'+(p.id?'Edit product':'Add product')+'</div><button onclick="document.getElementById(\'prod-ov\').remove()" style="background:none;border:none;color:#7E8290;font-size:24px;cursor:pointer;">&times;</button></div>'+
    '<div style="display:flex;gap:12px;align-items:center;margin-bottom:6px;"><img id="pd-prev" src="'+esc(p.imgUrl||'')+'" style="width:60px;height:60px;object-fit:cover;border-radius:9px;border:1px solid rgba(255,255,255,.14);background:#101116;'+(p.imgUrl?'':'display:none;')+'"><button type="button" class="s-btn" onclick="document.getElementById(\'pd-file\').click()">📷 Photo</button><input type="file" id="pd-file" accept="image/*" style="display:none;" onchange="pdImg(this)"><input type="hidden" id="pd-imgUrl" value="'+esc(p.imgUrl||'')+'"></div>'+
    '<label>Product name</label><input id="pd-name" value="'+esc(p.name||'')+'">'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;"><div><label>Brand</label><input id="pd-brand" value="'+esc(p.brand||'')+'"></div><div><label>Category</label><input id="pd-cat" value="'+esc(p.category||'')+'"></div><div><label>Price (₹)</label><input id="pd-price" type="number" value="'+esc(p.price||'')+'"></div><div><label>MRP / was (₹)</label><input id="pd-was" type="number" value="'+esc(p.was||'')+'"></div><div><label>Stock</label><input id="pd-stock" type="number" value="'+esc(p.stock||'')+'"></div></div>'+
    '<label style="margin-top:10px;display:block;">Description</label><textarea id="pd-desc" rows="2">'+String(p.description||'').replace(/</g,'&lt;')+'</textarea>'+
    '<div style="display:flex;gap:10px;margin-top:18px;"><button class="sd-btn" onclick="saveProd('+(p.id||0)+')">Save</button><button class="s-btn" onclick="document.getElementById(\'prod-ov\').remove()">Cancel</button></div>'+
    '</div>';
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
}
function pdImg(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const sc=Math.min(1,800/img.width);const cv=document.createElement('canvas');cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);const d=cv.toDataURL('image/jpeg',.8);document.getElementById('pd-imgUrl').value=d;const pv=document.getElementById('pd-prev');pv.src=d;pv.style.display='';};img.src=e.target.result;};r.readAsDataURL(f);}
async function saveProd(id){
  const v=x=>{const el=document.getElementById(x);return el?el.value:undefined;};
  const num=x=>{const y=v(x);return y===''||y==null?null:Number(y);};
  const body={name:v('pd-name'),brand:v('pd-brand'),category:v('pd-cat'),price:num('pd-price'),was:num('pd-was'),stock:num('pd-stock'),description:v('pd-desc'),imgUrl:v('pd-imgUrl'),active:true};
  if(!body.name||!(body.price>=0)){alert('Enter a name and price');return;}
  const url=id?('/api/me/products/'+id):'/api/me/products';
  const r=await fetch(url,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+T()},body:JSON.stringify(body)}).then(x=>x.json()).catch(()=>null);
  if(r&&(r.ok||r.id)){ document.getElementById('prod-ov').remove(); boot(); if(window.ArcheryUI)ArcheryUI.toast('Saved','ok'); }
  else { if(window.ArcheryUI)ArcheryUI.toast((r&&r.error)||'Could not save','err'); else alert((r&&r.error)||'Could not save'); }
}
async function delProd(id){ if(!confirm('Delete this product?'))return; await fetch('/api/me/products/'+id,{method:'DELETE',headers:{Authorization:'Bearer '+T()}}); boot(); }

boot();
</script>
<script src="shared.js"></script>
</body>
</html>
