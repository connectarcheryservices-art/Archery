<!DOCTYPE html>
<html lang="en" data-theme="day">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Archery Coach — Archery.Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root{--tw:#FFFFFF;--tb:#1A1A1A;--tbl:#1A3A8C;--tr:#CC2222;--ty:#C9A227;--bg:#F5F7FA;--bg2:#FFFFFF;--ink:#0D1B2E;--dim:#334155;--faint:#8899AA;--line:rgba(26,58,140,.1);}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;margin:0;}
[data-theme="night"]{--bg:#0D1117;--bg2:#161B22;--ink:#E6EDF3;--dim:#8B949E;--faint:#4A5568;--line:rgba(255,255,255,.08);}
.page-hero{background:linear-gradient(135deg,#0D1840,#1A3A8C);padding:52px 24px 40px;text-align:center;color:#fff;}
.page-hero h1{font-family:'Oswald',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:700;text-transform:uppercase;margin:0 0 10px;}
.page-hero h1 em{color:#C9A227;font-style:normal;}
.page-hero p{font-size:15px;color:rgba(255,255,255,.75);max-width:520px;margin:0 auto;line-height:1.6;}
.ai-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,162,39,.15);border:1px solid rgba(201,162,39,.4);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#C9A227;margin-bottom:16px;}

.ai-wrap{max-width:1100px;margin:0 auto;padding:32px 24px;display:grid;grid-template-columns:1fr 340px;gap:24px;}
@media(max-width:768px){.ai-wrap{grid-template-columns:1fr;}}

/* CHAT */
.chat-panel{background:var(--bg2);border-radius:12px;border:1px solid var(--line);overflow:hidden;display:flex;flex-direction:column;height:680px;}
.chat-header{padding:18px 22px;background:#1A3A8C;color:#fff;display:flex;align-items:center;gap:12px;}
.chat-avatar{width:40px;height:40px;border-radius:50%;background:#C9A227;display:flex;align-items:center;justify-content:center;font-size:18px;}
.chat-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;}
.chat-status{font-size:11px;color:rgba(255,255,255,.65);}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
.msg{display:flex;gap:10px;max-width:85%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.msg.ai .msg-avatar{background:#1A3A8C;color:#fff;}
.msg.user .msg-avatar{background:#C9A227;color:#1A1A1A;}
.msg-bubble{padding:12px 16px;border-radius:12px;font-size:13.5px;line-height:1.55;}
.msg.ai .msg-bubble{background:var(--bg);color:var(--ink);border-radius:4px 12px 12px 12px;}
.msg.user .msg-bubble{background:#1A3A8C;color:#fff;border-radius:12px 4px 12px 12px;}
.msg-confidence{font-size:10px;color:var(--faint);margin-top:4px;display:flex;align-items:center;gap:4px;}
.conf-dot{width:6px;height:6px;border-radius:50%;background:#22C55E;}
.chat-input-row{padding:16px;border-top:1px solid var(--line);display:flex;gap:8px;}
.chat-input{flex:1;padding:11px 16px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);outline:none;}
.chat-input:focus{border-color:#1A3A8C;}
.chat-send{padding:11px 20px;background:#C9A227;color:#1A1A1A;border:none;border-radius:8px;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
.quick-prompts{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 12px;}
.qp-btn{padding:5px 12px;background:var(--bg);border:1px solid var(--line);border-radius:14px;font-size:11.5px;color:var(--dim);cursor:pointer;transition:all .2s;}
.qp-btn:hover{background:#1A3A8C;color:#fff;border-color:#1A3A8C;}

/* SIDEBAR */
.side-panel{display:flex;flex-direction:column;gap:16px;}
.side-card{background:var(--bg2);border-radius:12px;border:1px solid var(--line);overflow:hidden;}
.side-card-head{padding:14px 18px;background:#1A3A8C;color:#fff;font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.side-card-body{padding:16px 18px;}
.tech-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.tech-icon{width:36px;height:36px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tech-info{flex:1;}
.tech-name{font-size:13px;font-weight:600;color:var(--ink);}
.score-bar{height:5px;background:var(--line);border-radius:3px;margin-top:4px;overflow:hidden;}
.score-fill{height:100%;border-radius:3px;}
.score-num{font-size:11px;color:var(--faint);}
.plan-row{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);}
.plan-row:last-child{border-bottom:none;}
.plan-day{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#C9A227;min-width:36px;}
.plan-session{font-size:12px;font-weight:600;color:var(--ink);}
.plan-focus{font-size:11px;color:var(--faint);margin-top:2px;}
.int-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.int-low{background:rgba(34,197,94,.1);color:#16A34A;}
.int-med{background:rgba(201,162,39,.1);color:#92691A;}
.int-high{background:rgba(204,34,34,.1);color:#CC2222;}
</style>
</head>
<body>

<nav style="position:sticky;top:0;z-index:300;background:#fff;border-bottom:1px solid rgba(26,58,140,.1);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:68px;">
  <a href="/" style="font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:#1A3A8C;text-decoration:none;">Archery<span style="color:#C9A227">.</span>Services</a>
  <div style="display:flex;gap:24px;align-items:center;">
    <a href="discover.html" style="font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#334155;text-decoration:none;">Discover</a>
    <a href="distance-drill.html" style="font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#334155;text-decoration:none;">Drills</a>
    <a href="pricing.html" style="padding:9px 20px;background:#C9A227;color:#1A1A1A;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;border-radius:4px;">Join Free</a>
  </div>
</nav>

<div class="page-hero">
  <div class="ai-badge">🤖 AI Powered</div>
  <h1>Your Personal <em>Archery AI</em> Coach</h1>
  <p>Ask anything about technique, training, equipment, or competition strategy. Powered by your performance data.</p>
</div>

<div class="ai-wrap">
  <!-- CHAT PANEL -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-avatar">🏹</div>
      <div>
        <div class="chat-title">Archery AI Coach</div>
        <div class="chat-status">● Online · Analysing your profile data</div>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <!-- pre-loaded conversation -->
    </div>
    <div class="quick-prompts" id="quick-prompts">
      <button class="qp-btn" onclick="sendQuick(this)">Fix my anchor point</button>
      <button class="qp-btn" onclick="sendQuick(this)">Improve my grouping</button>
      <button class="qp-btn" onclick="sendQuick(this)">Competition prep advice</button>
      <button class="qp-btn" onclick="sendQuick(this)">2-week training plan</button>
      <button class="qp-btn" onclick="sendQuick(this)">Equipment tuning tips</button>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" type="text" placeholder="Ask your AI coach anything…" onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="chat-send" onclick="sendMsg()">Send</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="side-panel">
    <!-- Technique Analysis -->
    <div class="side-card">
      <div class="side-card-head">Technique Analysis</div>
      <div class="side-card-body">
        <div id="tech-list"></div>
      </div>
    </div>
    <!-- Training Plan -->
    <div class="side-card">
      <div class="side-card-head">This Week's Plan</div>
      <div class="side-card-body">
        <div id="plan-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
const MESSAGES = [
  {role:'ai',content:'Hello! I\'m your Archery AI Coach. I\'ve reviewed your recent session data — your grouping at 18m has improved 11% this month. Your biggest opportunity right now is anchor point consistency. Would you like me to walk through a drill sequence for that?',confidence:null},
  {role:'user',content:'Yes, my arrows keep hitting left of centre even when my aim feels perfect.'},
  {role:'ai',content:'Left-of-centre hits (for a right-handed archer) are almost always one of four things:\n\n1. Anchor point drifting — your string hand is contacting your face in a slightly different position each shot. Check that your index finger knuckle is touching the same spot under your chin every time.\n\n2. Grip torque — your bow hand is pushing left at the shot. The bow grip should contact only the fleshy pad at the base of your thumb, not the palm. A wrist sling will show you if you\'re gripping.\n\n3. Clicker timing — if you\'re using a clicker, drawing through it at an angle rather than straight back causes a left deflection.\n\n4. Wind drift — at 18m this is minor, but at 50m+ significant. Check your grouping on a calm day first.\n\nStart with grip: shoot three ends with a wrist sling and your hand completely open after the clicker fires. Report the grouping position back to me.',confidence:96},
  {role:'user',content:'I use a clicker. The sling test actually helped — groups moved right by about 5cm.'},
  {role:'ai',content:'That confirms grip torque as the primary cause. Your bow hand was pushing left by approximately 5-6cm at 18m — at 70m this would produce 15-20cm left deviation.\n\nFix protocol:\n\n• Bow hand: press only with the base-of-thumb pad. Fingers should curl naturally away from the bow.\n• After the shot: let the bow fall forward freely. If your hand closes on it, you were gripping.\n• Drill: 20 arrows at 9m, target removed. Focus entirely on the hand position, not the result. The blank bale removes the visual distraction.\n• After 3 sessions: return to target at 18m and record your horizontal spread.\n\nTarget benchmark: your horizontal group diameter should reduce by at least 60% within 2 weeks of consistent application.',confidence:98},
];

const TECHNIQUES = [
  {name:'Anchor Point',score:72,color:'#C9A227'},
  {name:'Draw Length',score:88,color:'#22C55E'},
  {name:'Bow Arm Extension',score:65,color:'#CC2222'},
  {name:'Back Tension',score:79,color:'#1A3A8C'},
  {name:'Follow Through',score:83,color:'#22C55E'},
  {name:'Clicker Timing',score:70,color:'#C9A227'},
];

const PLAN = [
  {day:'Mon',session:'Blank Bale',focus:'Grip isolation — 30 arrows',intensity:'low'},
  {day:'Tue',session:'18m Scoring',focus:'Anchor consistency tracking',intensity:'med'},
  {day:'Wed',session:'Rest',focus:'Mobility & stretch',intensity:'low'},
  {day:'Thu',session:'Blank Bale',focus:'Back tension activation',intensity:'med'},
  {day:'Fri',session:'50m Outdoor',focus:'Wind reading + grouping log',intensity:'high'},
  {day:'Sat',session:'Full Training',focus:'Clicker timing isolation',intensity:'high'},
  {day:'Sun',session:'Rest',focus:'Mental rehearsal 10 min',intensity:'low'},
];

function renderMessages(){
  const container=document.getElementById('chat-messages');
  container.innerHTML=MESSAGES.map(m=>`
    <div class="msg ${m.role}">
      <div class="msg-avatar">${m.role==='ai'?'🏹':'👤'}</div>
      <div>
        <div class="msg-bubble">${m.content.replace(/\n/g,'<br>')}</div>
        ${m.confidence?`<div class="msg-confidence"><div class="conf-dot"></div>AI confidence: ${m.confidence}%</div>`:''}
      </div>
    </div>`).join('');
  container.scrollTop=container.scrollHeight;
}

function renderTech(){
  document.getElementById('tech-list').innerHTML=TECHNIQUES.map(t=>`
    <div class="tech-row">
      <div class="tech-icon">🎯</div>
      <div class="tech-info">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="tech-name">${t.name}</span>
          <span class="score-num">${t.score}/100</span>
        </div>
        <div class="score-bar"><div class="score-fill" style="width:${t.score}%;background:${t.color};"></div></div>
      </div>
    </div>`).join('');
}

function renderPlan(){
  document.getElementById('plan-list').innerHTML=PLAN.map(p=>`
    <div class="plan-row">
      <div class="plan-day">${p.day}</div>
      <div>
        <div class="plan-session">${p.session}</div>
        <div class="plan-focus">${p.focus}</div>
      </div>
      <span class="int-badge int-${p.intensity}">${p.intensity}</span>
    </div>`).join('');
}

const AI_RESPONSES = {
  'anchor':'Anchor point is the single biggest variable in shot-to-shot consistency. The key checkpoints: (1) string touching tip of nose and centre of chin every shot, (2) index finger knuckle in the same facial hollow, (3) head position not rotating between shots. Use a mirror or phone camera to verify — you cannot feel small variations that show clearly on video.',
  'group':'Tight grouping comes from reducing variation in three things: anchor, bow hand pressure, and release. If your groups are consistent but off-centre, that\'s an equipment or sight problem — easy fix. If the group is scattered, it\'s a technique problem. Shoot 3 arrows at 9m with your eyes closed after aiming at 9m. Consistent near-centre hits = the technique is there; scattered = check anchor and release.',
  'competition':'Competition preparation has two phases. Physical: in the 2 weeks before, reduce volume by 30%, maintain intensity. Mental: develop a pre-shot routine that takes the same time every shot — this is your anchor under pressure. Arrive at the venue 2 hours before to walk the ground, note wind patterns, and warm up at competition distance. Never try new equipment within 3 weeks of an event.',
  'training':'Here is a 2-week plan for your current level:\n\nWeek 1: Mon — Blank bale 30 arrows. Tue — 18m scoring 60 arrows. Wed — Rest. Thu — 18m technique focus 40 arrows. Fri — 30m grouping 60 arrows. Sat — Mixed distance (18m + 30m). Sun — Rest.\n\nWeek 2: Mon — Blank bale 20 arrows + clicker timing. Tue — 50m 60 arrows. Wed — Rest. Thu — Competition simulation 60 arrows timed. Fri — Rest. Sat — Full FITA round practice. Sun — Mental review and visualisation.',
  'equipment':'Equipment tuning starts with arrow spine. Use the Easton spine chart for your draw weight and arrow length. Then: nocking point at exactly 90° to the arrow rest (use a T-square). Plunger button at centre-shot for recurve. Then paper tune at 6m — perfect bullet hole = spine is matched. If tearing right the arrow is too stiff, tearing left is too weak (right-handed archer). Brace height at manufacturer spec ±3mm.',
};

function sendMsg(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text)return;
  addMsg('user',text,null);
  input.value='';
  setTimeout(()=>{
    const lower=text.toLowerCase();
    let resp='That\'s a great question. Based on your recent training data, I recommend focusing on your blank bale practice for the next 2 weeks to isolate the specific variable you\'re working on. Keep sessions to 30-40 arrows maximum to maintain quality. Would you like me to build a targeted drill sequence for this specific issue?';
    if(lower.includes('anchor'))resp=AI_RESPONSES.anchor;
    else if(lower.includes('group'))resp=AI_RESPONSES.group;
    else if(lower.includes('competition')||lower.includes('comp'))resp=AI_RESPONSES.competition;
    else if(lower.includes('plan')||lower.includes('training'))resp=AI_RESPONSES.training;
    else if(lower.includes('equip')||lower.includes('tun'))resp=AI_RESPONSES.equipment;
    addMsg('ai',resp,Math.floor(Math.random()*12)+86);
  },900);
}

function sendQuick(btn){
  document.getElementById('chat-input').value=btn.textContent;
  sendMsg();
}

function addMsg(role,content,confidence){
  MESSAGES.push({role,content,confidence});
  renderMessages();
}

renderMessages();renderTech();renderPlan();
</script>
<script src="shared.js"></script>
</body>
</html>
