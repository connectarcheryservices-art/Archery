<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Archery.Services</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Oswald','Inter',system-ui,sans-serif;background:#101116;color:#F5F6F8;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:28px;}
  .wrap{max-width:400px;}
  svg{width:76px;height:76px;margin-bottom:24px;}
  h1{font-size:26px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-bottom:12px;}
  h1 span{color:#C9A227;}
  p{font-family:'Inter',sans-serif;font-size:14px;color:#B9BEC9;line-height:1.7;margin-bottom:26px;}
  button{font-family:'Oswald',sans-serif;background:#C9A227;color:#131316;border:none;border-radius:4px;padding:13px 30px;font-size:14px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
  button:hover{background:#D9B33A;}
  .note{font-family:'Inter',sans-serif;font-size:12px;color:#7E8290;margin-top:18px;}
</style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 64 64" fill="none" aria-hidden="true">
      <circle cx="32" cy="32" r="30" stroke="#C9A227" stroke-width="1.5"/>
      <circle cx="32" cy="32" r="20" stroke="#3D4048" stroke-width="1.5"/>
      <circle cx="32" cy="32" r="6" fill="#C9A227"/>
      <line x1="4" y1="58" x2="60" y2="6" stroke="#D22730" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <h1>You're <span>offline</span></h1>
    <p>No internet connection right now. Pages and gear you've already viewed are still available — reconnect to shop, register, and see live scores.</p>
    <button onclick="location.reload()">Retry</button>
    <div class="note">Archery.Services works offline once installed to your home screen.</div>
  </div>
</body>
</html>
