<!DOCTYPE html>
<html lang="en" data-theme="day">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournament Draw — Archery.Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root{--tw:#FFFFFF;--tb:#1A1A1A;--tbl:#0F5FA8;--tr:#D22730;--ty:#C9A227;--bg:#F5F7FA;--bg2:#FFFFFF;--ink:#0D1B2E;--dim:#334155;--faint:#8899AA;--line:rgba(15,95,168,.1);}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;margin:0;}
[data-theme="night"]{--bg:#0D1117;--bg2:#161B22;--ink:#E6EDF3;--dim:#8B949E;--faint:#4A5568;--line:rgba(255,255,255,.08);}
.page-hero{background:linear-gradient(135deg,#131316,#0F5FA8);padding:52px 24px 40px;text-align:center;color:#fff;}
.page-hero h1{font-family:'Oswald',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:700;text-transform:uppercase;margin:0 0 10px;}
.page-hero h1 em{color:#C9A227;font-style:normal;}
.page-hero p{font-size:15px;color:rgba(255,255,255,.75);max-width:520px;margin:0 auto;line-height:1.6;}
.wrap{max-width:1140px;margin:0 auto;padding:36px 24px;}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:32px;overflow-x:auto;}
.tab-btn{padding:12px 24px;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;background:none;cursor:pointer;color:var(--faint);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;}
.tab-btn.active{color:#C9A227;border-bottom-color:#C9A227;}
.tab-panel{display:none;}.tab-panel.active{display:block;}

/* ACTIVE DRAWS */
.draw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;}
.draw-card{background:var(--bg2);border-radius:10px;border:1px solid var(--line);overflow:hidden;transition:box-shadow .2s;}
.draw-card:hover{box-shadow:0 6px 24px rgba(15,95,168,.1);}
.draw-card-head{padding:18px 20px;background:#0F5FA8;color:#fff;position:relative;}
.draw-name{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;}
.draw-meta{font-size:12px;color:rgba(255,255,255,.65);margin-top:4px;}
.draw-status{position:absolute;top:16px;right:16px;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.s-published{background:#22C55E;color:#fff;}
.s-draft{background:#C9A227;color:#1A1A1A;}
.s-progress{background:#D22730;color:#fff;}
.s-complete{background:rgba(255,255,255,.2);color:#fff;}
.draw-body{padding:18px 20px;}
.draw-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.ds-val{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#0F5FA8;}
.ds-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);}
.draw-hash{font-family:monospace;font-size:11px;color:var(--faint);margin-bottom:14px;}
.draw-actions{display:flex;gap:8px;}
.da-btn{flex:1;padding:9px;border:none;border-radius:6px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
.da-view{background:#0F5FA8;color:#fff;}
.da-export{background:var(--bg);color:var(--dim);border:1.5px solid var(--line);}

/* BRACKET */
.bracket-wrap{overflow-x:auto;padding-bottom:16px;}
.bracket{display:flex;gap:0;align-items:flex-start;}
.bracket-round{display:flex;flex-direction:column;gap:0;min-width:200px;}
.bracket-round-label{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);text-align:center;padding:8px 16px;background:var(--bg);border-bottom:1px solid var(--line);}
.bracket-matches{display:flex;flex-direction:column;justify-content:space-around;padding:8px;}
.bracket-match{margin:4px 8px;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--bg2);}
.bracket-athlete{padding:8px 12px;font-size:12px;color:var(--ink);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.bracket-athlete:last-child{border-bottom:none;}
.bracket-athlete.winner{font-weight:700;color:#0F5FA8;}
.bracket-athlete.winner::after{content:'✓';color:#22C55E;font-size:11px;}
.bracket-bye{padding:8px 12px;font-size:12px;color:var(--faint);font-style:italic;}
.ba-score{font-family:'Oswald',sans-serif;font-weight:700;color:#C9A227;}
.connector{width:24px;display:flex;align-items:center;}

/* GENERATOR */
.gen-form{background:var(--bg2);border-radius:12px;border:1px solid var(--line);overflow:hidden;max-width:700px;}
.gen-head{background:#0F5FA8;color:#fff;padding:20px 24px;font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;}
.gen-body{padding:24px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.field-group{display:flex;flex-direction:column;gap:5px;}
.field-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
.field-input{padding:10px 14px;border:1.5px solid var(--line);border-radius:6px;font-size:14px;font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);outline:none;}
.field-input:focus{border-color:#0F5FA8;}
.field-row-full{margin-bottom:16px;}
.athletes-box{min-height:140px;padding:10px 14px;border:1.5px solid var(--line);border-radius:6px;font-size:13px;font-family:monospace;background:var(--bg);color:var(--ink);resize:vertical;outline:none;width:100%;box-sizing:border-box;}
.gen-btn{width:100%;padding:14px;background:#C9A227;color:#1A1A1A;border:none;border-radius:6px;font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s;margin-top:8px;}
.gen-btn:hover{background:#D9B33A;}
.gen-output{background:var(--bg);border-radius:8px;padding:16px;margin-top:16px;display:none;}
.gen-output h3{font-family:'Oswald',sans-serif;font-size:15px;color:var(--ink);margin:0 0 12px;}
@media print{body.print-bracket *{visibility:hidden;}body.print-bracket #tab-bracket,body.print-bracket #tab-bracket *{visibility:visible;}body.print-bracket #tab-bracket{position:absolute;top:0;left:0;width:100%;}}
</style>
</head>
<body>

<nav style="position:sticky;top:0;z-index:300;background:#fff;border-bottom:1px solid rgba(15,95,168,.1);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;column-gap:12px;padding:6px clamp(14px,4vw,32px);min-height:60px;">
  <a href="/" style="font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:#0F5FA8;text-decoration:none;">Archery<span style="color:#C9A227">.</span>Services</a>
  <div style="display:flex;gap:clamp(10px,3vw,24px);align-items:center;flex-wrap:wrap;justify-content:flex-end;">
    <a href="tournaments.html" style="font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#334155;text-decoration:none;">Tournaments</a>
    <a href="pricing.html" style="padding:9px 20px;background:#C9A227;color:#1A1A1A;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;border-radius:4px;">Join Free</a>
  </div>
</nav>

<div class="page-hero">
  <h1>Tournament <em>Draw</em> Generator</h1>
  <p>Generate, publish, and manage fair brackets for any archery format — recurve, compound, field, or 3D.</p>
</div>

<div class="wrap">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="setTab('active',this)">Active Draws</button>
    <button class="tab-btn" onclick="setTab('bracket',this)">Sample Bracket</button>
    <button class="tab-btn" onclick="setTab('generate',this)">Generate Draw</button>
    <button class="tab-btn" onclick="setTab('history',this)">Archive</button>
  </div>

  <!-- ACTIVE DRAWS -->
  <div class="tab-panel active" id="tab-active">
    <div class="draw-grid" id="draws-grid"></div>
  </div>

  <!-- BRACKET VIEW -->
  <div class="tab-panel" id="tab-bracket">
    <!-- Header is filled in from the draw you generate. It used to hard-code
         "India Open 2026 — Recurve Men Senior · 12 Sep 2026 · New Delhi" and
         "Draw hash: 7f3a9b2c1d · Published · Verified" — an event that does not
         exist, marked Verified (CLAUDE.md §1.1). -->
    <div style="margin-bottom:20px;" id="bracket-head"></div>
    <div class="bracket-wrap">
      <div class="bracket" id="bracket-display"></div>
    </div>
  </div>

  <!-- GENERATOR -->
  <div class="tab-panel" id="tab-generate">
    <div class="gen-form">
      <div class="gen-head">🎯 New Tournament Draw</div>
      <div class="gen-body">
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Tournament Name</label>
            <input class="field-input" id="g-name" placeholder="e.g. India Open 2026">
          </div>
          <div class="field-group">
            <label class="field-label">Date</label>
            <input class="field-input" type="date" id="g-date">
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Category</label>
            <select class="field-input" id="g-cat">
              <option>Recurve Men Senior</option>
              <option>Recurve Women Senior</option>
              <option>Compound Men Senior</option>
              <option>Compound Women Senior</option>
              <option>Recurve Men U21</option>
              <option>Recurve Women U21</option>
              <option>Traditional Men</option>
              <option>Traditional Women</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">Format</label>
            <select class="field-input" id="g-format">
              <option>Single Elimination</option>
              <option>Double Elimination</option>
              <option>Round Robin</option>
              <option>Seeded Elimination</option>
            </select>
          </div>
        </div>
        <div class="field-row-full">
          <div class="field-group">
            <label class="field-label">Athletes (one per line — add seedings with # e.g. "Deepika Kumari #1")</label>
            <textarea class="athletes-box" id="g-athletes" placeholder="Deepika Kumari #1&#10;Ankita Bhakat #2&#10;Komalika Bari #3&#10;Tanisha Sawant&#10;Simranjeet Kaur&#10;Priya Sharma&#10;Bhajan Kaur&#10;Laishram Bombayla Devi"></textarea>
          </div>
        </div>
        <button class="gen-btn" onclick="generateDraw()">Generate Draw</button>
        <div class="gen-output" id="gen-output">
          <h3>Draw Generated</h3>
          <div id="gen-result"></div>
          <div style="margin-top:12px;display:flex;gap:8px;">
            <button class="da-btn da-view" style="flex:none;padding:9px 20px;" onclick="setTab('bracket',document.querySelectorAll('.tab-btn')[1]);renderBracket(genAthletes)">View Bracket</button>
            <button class="da-btn da-export" style="flex:none;padding:9px 20px;" onclick="setTab('bracket',document.querySelectorAll('.tab-btn')[1]);renderBracket(genAthletes);setTimeout(printBracket,350)">Export PDF</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="tab-panel" id="tab-history">
    <div id="history-list"></div>
  </div>
</div>

<script src="esc.js"></script>
<script>
// There is no published-draw store yet: draws are a CONSEQUENCE of qualification
// (docs/DOMAIN.md §3), and qualification needs arrows, which the schema does not
// have until Phase 2. So this board has nothing real to show and says nothing.
//
// Deleted 2026-07-15 (CLAUDE.md §1.1): DRAWS[] listed five tournaments that do
// not exist, attributed to real federations (Archery GB, Archery Australia,
// Archery Association of India) who have not published anything here. HISTORY[]
// went further and asserted invented RESULTS against real, named athletes —
// "World Championship 2025 · Winner: Brady Ellison", "India Open 2025 · Winner:
// Deepika Kumari". A platform claiming to be archery's system of record cannot
// invent who won a world championship. Do not reintroduce either array; when a
// draw is real it arrives from the API, keyed to a qualification round.
let genAthletes=[];

const EMPTY=(msg)=>`<div style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:40px 24px;text-align:center;color:var(--faint);font-size:13px;line-height:1.7;">${msg}</div>`;

function renderDraws(){
  document.getElementById('draws-grid').innerHTML=EMPTY(
    '<strong style="color:var(--dim);display:block;margin-bottom:6px;font-size:14px;">No published draws yet.</strong>'+
    'Draws appear here once an event\'s qualification round is scored on the platform.<br>'+
    'To build a pairing now, use the <strong>Generate</strong> tab.');
}

function renderHistory(){
  document.getElementById('history-list').innerHTML=EMPTY(
    '<strong style="color:var(--dim);display:block;margin-bottom:6px;font-size:14px;">No archived draws yet.</strong>'+
    'Completed events and their results are archived here once they have been run on the platform.');
}

// Export = print-to-PDF of the bracket panel (browser's Save as PDF)
function printBracket(){
  document.body.classList.add('print-bracket');
  window.print();
  setTimeout(()=>document.body.classList.remove('print-bracket'),400);
}

function renderBracket(athletes){
  const n=athletes.length;
  const rounds=Math.ceil(Math.log2(n));
  const bracket=document.getElementById('bracket-display');
  const ROUND_NAMES=['QF','SF','Final','Champion'];

  let currentRound=athletes.map((a,i)=>({a,seed:i+1}));
  let html='';
  for(let r=0;r<rounds;r++){
    const label=rounds-r<=ROUND_NAMES.length?ROUND_NAMES[rounds-r-1]:`Round ${r+1}`;
    const matches=[];
    for(let i=0;i<currentRound.length;i+=2){
      const a=currentRound[i];
      const b=currentRound[i+1]||null;
      matches.push({a,b});
    }
    html+=`<div class="bracket-round"><div class="bracket-round-label">${label}</div><div class="bracket-matches">`;
    matches.forEach(m=>{
      // No result exists until real arrows are scored (docs/DOMAIN.md §1).
      // Show the pairing with an empty score slot. Never invent a winner.
      html+=`<div class="bracket-match">
        <div class="bracket-athlete">${escA(m.a.a)} <span class="ba-score">–</span></div>
        ${m.b?`<div class="bracket-athlete">${escA(m.b.a)} <span class="ba-score">–</span></div>`:
        `<div class="bracket-bye">— BYE —</div>`}
      </div>`;
    });
    html+='</div></div><div class="connector"></div>';
    // Only a BYE advances without a match. Everything else is TBD until scored.
    currentRound=matches.map(m=>m.b?{a:'TBD'}:m.a);
  }
  html+=`<div class="bracket-round"><div class="bracket-round-label">🥇 Winner</div><div class="bracket-matches"><div class="bracket-match"><div class="bracket-athlete winner" style="background:#C9A22722;">${escA(currentRound[0]?.a||'TBD')} 🏆</div></div></div></div>`;
  bracket.innerHTML=html;
  const head=document.getElementById('bracket-head');
  if(head){
    const name=(document.getElementById('g-name')?.value||'').trim();
    head.innerHTML=`
      <div style="font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--ink);">${escA(name||'Unnamed draw')}</div>
      <div style="font-size:13px;color:var(--faint);margin-top:4px;">${n} athletes · ${escA(document.getElementById('g-format')?.value||'Elimination')} · pairings only — no results until arrows are scored</div>`;
  }
}

// Unbiased Fisher-Yates over crypto.getRandomValues. The previous
// `sort(() => Math.random() - .5)` is a well-known broken shuffle: comparator
// results are inconsistent, so the permutation is measurably non-uniform and the
// bias depends on the engine's sort. For deciding who shoots whom, "roughly
// random" is not good enough.
function shuffle(list){
  const a=[...list];
  for(let i=a.length-1;i>0;i--){
    const r=new Uint32Array(1);
    let j;
    // Rejection-sample to avoid modulo bias.
    const limit=Math.floor(0xFFFFFFFF/(i+1))*(i+1);
    do{ crypto.getRandomValues(r); }while(r[0]>=limit);
    j=r[0]%(i+1);
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// A REAL hash of the draw: SHA-256 over the ordered pairing. Recomputable, so it
// actually proves the draw wasn't altered after the fact — which is the entire
// point of publishing one. Until 2026-07-15 this was Math.random() labelled
// "Draw hash": it verified nothing and changed on every render (CLAUDE.md §6 —
// a label that describes what we wished the code did).
async function drawHash(order){
  const data=new TextEncoder().encode(JSON.stringify(order));
  const buf=await crypto.subtle.digest('SHA-256',data);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
}

async function generateDraw(){
  const raw=document.getElementById('g-athletes').value.trim().split('\n').filter(s=>s.trim());
  genAthletes=raw.map(s=>s.replace(/#\d+/,'').trim());
  if(genAthletes.length<2){alert('Enter at least 2 athletes.');return;}
  // WA seeds elimination from the qualification ranking (1v64, 2v63) — see
  // docs/DOMAIN.md §3. No qualification scores exist yet, so this is an
  // UNSEEDED random pairing tool, and says so. It is not a WA-conformant draw.
  const shuffled=shuffle(genAthletes);
  const hash=await drawHash(shuffled);
  const name=document.getElementById('g-name').value||'New Draw';
  document.getElementById('gen-result').innerHTML=`
    <div style="font-size:13px;color:var(--dim);margin-bottom:8px;">Tournament: <strong>${escA(name)}</strong></div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:8px;">Athletes: <strong>${genAthletes.length}</strong> · Format: <strong>${escA(document.getElementById('g-format').value)}</strong></div>
    <div style="font-family:monospace;font-size:11px;color:var(--faint);">Draw hash (SHA-256): ${escA(hash)} · Generated ${escA(new Date().toLocaleString())}</div>
    <div style="font-size:11px;color:var(--faint);margin-top:6px;">Unseeded random pairing — <strong>not</strong> a World Archery seeded draw. A WA elimination bracket is seeded from the qualification ranking (1v64, 2v63); no qualification round has been scored here.</div>
    <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;">${shuffled.map((a,i)=>`<span style="padding:4px 10px;background:rgba(15,95,168,.07);border-radius:4px;font-size:12px;color:#0F5FA8;"><strong>${i+1}.</strong> ${escA(a)}</span>`).join('')}</div>`;
  document.getElementById('gen-output').style.display='block';
}

function setTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

// The bracket tab starts empty: on load there is no draw. It used to boot by
// rendering a bracket of real named athletes under a fabricated event header.
renderDraws();
renderHistory();
document.getElementById('bracket-display').innerHTML=EMPTY('Generate a draw to see its bracket.');
</script>
<script src="shared.js"></script>
</body>
</html>
