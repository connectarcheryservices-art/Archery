<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Archery.Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .fp-card{width:100%;max-width:420px;background:var(--char);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:32px;}
  .fp-logo{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#fff;margin-bottom:24px;}
  .fp-logo span{color:var(--gold);}
  h1{font-family:'Oswald',sans-serif;font-size:26px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;color:#fff;margin-bottom:8px;}
  .fp-sub{font-size:14px;color:var(--text-2);line-height:1.6;margin-bottom:24px;}
  label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-2);margin-bottom:7px;}
  input{width:100%;background:#101116;border:1px solid rgba(255,255,255,.14);border-radius:9px;padding:13px 14px;color:#fff;font-size:14px;box-sizing:border-box;font-family:inherit;}
  input:focus{border-color:var(--gold);outline:none;}
  .fp-btn{width:100%;margin-top:18px;background:var(--gold);color:#131316;border:none;border-radius:9px;padding:14px;font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
  .fp-msg{margin-top:16px;font-size:13px;line-height:1.6;padding:12px 14px;border-radius:9px;display:none;}
  .fp-msg.ok{display:block;background:rgba(34,197,94,.1);color:#7BE08A;border:1px solid rgba(34,197,94,.25);}
  .fp-msg.err{display:block;background:rgba(210,39,48,.1);color:#E04653;border:1px solid rgba(210,39,48,.25);}
  .fp-msg a{color:var(--gold);word-break:break-all;}
  .fp-foot{margin-top:20px;text-align:center;font-size:13px;}
  .fp-foot a{color:var(--gold);text-decoration:none;}
</style>
</head>
<body>
  <form class="fp-card" onsubmit="return doForgot(event)">
    <div class="fp-logo">Archery<span>.</span>Services</div>
    <h1>Reset password</h1>
    <p class="fp-sub">Enter your account email and we'll send you a link to set a new password.</p>
    <label for="fp-email">Email address</label>
    <input id="fp-email" type="email" autocomplete="email" placeholder="you@example.com" required>
    <button type="submit" class="fp-btn" id="fp-btn">Send reset link</button>
    <div class="fp-msg" id="fp-msg"></div>
    <div class="fp-foot"><a href="signin.html">← Back to sign in</a></div>
  </form>
<script>
async function doForgot(e){
  e.preventDefault();
  const btn=document.getElementById('fp-btn'), msg=document.getElementById('fp-msg');
  const email=document.getElementById('fp-email').value.trim();
  btn.disabled=true; btn.textContent='Sending…'; msg.className='fp-msg';
  const r=await fetch('/api/users/forgot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,origin:location.origin})}).then(x=>x.json()).catch(()=>null);
  btn.disabled=false; btn.textContent='Send reset link';
  if(r&&r.ok){
    msg.className='fp-msg ok';
    // If email delivery isn't configured, the API returns the link directly so you can still reset.
    msg.innerHTML = r.devLink
      ? 'Email delivery isn’t set up yet, so here is your reset link (valid 30 min):<br><a href="'+r.devLink+'">'+r.devLink+'</a>'
      : (r.message||'If that email is registered, a reset link has been sent. Check your inbox.');
  } else { msg.className='fp-msg err'; msg.textContent=(r&&r.error)||'Something went wrong. Please try again.'; }
  return false;
}
</script>
<script src="shared.js"></script>
</body>
</html>
